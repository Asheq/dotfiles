# Documentation: https://sw.kovidgoyal.net/kitty/conf.html
# Note: Reload kitty.conf with ctrl+cmd+,
# Note: Print current config with opt+cmd+,

# Advanced
# ==============================================================================
allow_remote_control       yes
shell_integration          no-title

# Fonts
# ==============================================================================
modify_font                cell_height 110%
disable_ligatures          always
font_family                PragmataPro Mono
# font_family                Iosevka Term
font_size                  18.0

# OS specific tweaks
# ==============================================================================
macos_option_as_alt        yes
macos_titlebar_color       background

# Text cursor customization
# ==============================================================================
cursor_blink_interval      0

# Keyboard shortcuts
# ==============================================================================
# NOTE: kitty_mod is ctrl+shift by default
kitty_mod                  cmd+shift

# Tabs
map cmd+t                  new_tab_with_cwd
map ctrl+tab               next_tab
map ctrl+shift+tab         previous_tab
map cmd+x                  set_tab_title

# Windows
map cmd+d                  new_window_with_cwd
map cmd+]                  next_window
map cmd+[                  previous_window
map cmd+w                  detach_window
map cmd+enter              next_layout

# OS windows
map cmd+n                  new_os_window

# Opacity
map cmd+o>1                set_background_opacity 1
map cmd+o>d                set_background_opacity default
map cmd+o>l                set_background_opacity -0.1
map cmd+o>m                set_background_opacity +0.1

# Shell integration
map cmd+b                  scroll_to_prompt -1
map cmd+f                  scroll_to_prompt 1
map cmd+g                  show_last_command_output

# Color scheme
# ==============================================================================
# For transparency
dynamic_background_opacity yes
background_opacity         0.9
background_blur            5

# Local overrides
# ==============================================================================
include                    kitty.local.conf
